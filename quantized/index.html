<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Quantized</title>
    <link rel="stylesheet" href="./style.css">
  </head>
  <body>
    <canvas id="quantized" aria-label="Quantized kinetic canvas"></canvas>
    <aside class="panel" id="panel">
      <button class="panel-toggle" id="panelToggle" type="button" aria-label="Toggle controls">Q</button>
      <div class="panel-body">
        <label>
          <span>motion</span>
          <input id="motion" type="range" min="0" max="3" step="0.01" value="1.35">
        </label>
        <label>
          <span>grain</span>
          <input id="grain" type="range" min="1" max="9" step="1" value="1">
        </label>
        <label>
          <span>blur</span>
          <input id="blur" type="range" min="0" max="36" step="1" value="0">
        </label>
        <label>
          <span>mutation</span>
          <input id="mutation" type="range" min="0" max="3" step="0.01" value="1">
        </label>
        <label>
          <span>rays</span>
          <input id="raySpeed" type="range" min="0" max="3" step="0.01" value="1">
        </label>
        <label>
          <span>objects</span>
          <input id="density" type="range" min="0" max="1.35" step="0.01" value="1">
        </label>
        <button class="reset" id="resetParams" type="button">reset</button>
      </div>
    </aside>
    <script src="./quantized.js"></script>
  </body>
</html>
